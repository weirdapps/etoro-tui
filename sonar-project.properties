# SonarCloud configuration for etoro-tui (Python 3.13)

sonar.organization=weirdapps
sonar.projectKey=weirdapps_etoro-tui
sonar.projectName=etoro-tui

# Source code location
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# Python-specific settings
sonar.python.version=3.13

# Coverage reports
sonar.python.coverage.reportPaths=coverage.xml

# Exclusions
sonar.exclusions=\
  **/.venv/**,\
  **/venv/**,\
  **/__pycache__/**,\
  **/.pytest_cache/**,\
  **/*.egg-info/**,\
  **/dist/**,\
  **/build/**

# Test inclusions (tests/ tree)
sonar.test.inclusions=tests/**/*.py
