version: 2
updates:
  # Python deps via uv (pyproject.toml + uv.lock). uv, not pip: the pip
  # ecosystem updates pyproject.toml but leaves uv.lock stale; the uv
  # ecosystem updates both together (Dependabot uv GA 2025-03).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    labels:
      - "dependencies"
    groups:
      development-dependencies:
        dependency-type: "development"
        update-types: ["minor", "patch"]
      production-dependencies:
        dependency-type: "production"
        update-types: ["minor", "patch"]

  # GitHub Actions used in CI workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "ci(actions)"
    labels:
      - "ci"
      - "dependencies"
