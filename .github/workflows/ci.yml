name: ci

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    name: ruff (lint + format check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install "ruff>=0.7"

      - name: ruff check
        run: ruff check .

      - name: ruff format --check
        run: ruff format --check .

  audit:
    name: pip-audit (vulnerability scan)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.13
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit project dependencies for known CVEs
        # `pip-audit .` audits the project at this path: it reads
        # pyproject.toml, resolves all runtime + extras deps, scans them
        # against PyVA/OSV. Doesn't try to look up etoro-tui itself on PyPI
        # (which would fail since we haven't published yet).
        # --strict: fail on any vulnerability with a known fix.
        run: pip-audit . --strict --progress-spinner off

  test:
    name: pytest (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    needs: [lint, audit]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Install package + dev deps
        run: uv pip install --system -e ".[dev]"

      - name: Run pytest
        run: pytest -v

      - name: Boot smoke test (TUI starts and exits cleanly)
        run: |
          python - <<'PY'
          import asyncio
          from etoro_tui.app import EtoroTuiApp
          async def go():
              app = EtoroTuiApp(disable_polling=True)
              async with app.run_test() as pilot:
                  await pilot.pause()
                  for k in ("s", "/", "escape", "?", "escape", "q"):
                      await pilot.press(k)
                      await pilot.pause()
          asyncio.run(go())
          print("smoke OK")
          PY

      - name: Demo mode boot test
        run: |
          python - <<'PY'
          import asyncio
          from etoro_tui.demo import build_demo_state, build_demo_indices
          from etoro_tui.app import EtoroTuiApp
          async def go():
              app = EtoroTuiApp(initial_state=build_demo_state(), disable_polling=True)
              app._demo_indices = build_demo_indices()
              async with app.run_test() as pilot:
                  await pilot.pause()
          asyncio.run(go())
          print("demo OK")
          PY
